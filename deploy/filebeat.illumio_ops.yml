filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /opt/illumio-ops/logs/illumio_ops.json.log
    json.keys_under_root: true
    json.add_error_key: true
    fields:
      source_type: illumio_ops
    fields_under_root: true
    # Multiline not needed — each line is a self-contained JSON object
    encoding: utf-8

processors:
  - add_host_metadata: {}
  - add_cloud_metadata: {}

output.elasticsearch:
  hosts: ["elastic.example.com:9200"]
  index: "illumio-ops-%{+yyyy.MM.dd}"
  protocol: "https"
  ssl.enabled: true
  ssl.verification_mode: full
  ssl.certificate_authorities: ["/etc/filebeat/ca.crt"]
  # Uncomment and set credentials if authentication is enabled:
  # username: "filebeat_writer"
  # password: "<REPLACE_ME>"

setup.template.name: "illumio-ops"
setup.template.pattern: "illumio-ops-*"
setup.ilm.enabled: false

logging.level: warning
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
