# /etc/rsyslog.d/90-illumio_ops.conf
# Forward illumio_ops JSON logs to remote SIEM over TLS/TCP
#
# Prerequisites:
#   - rsyslog 8.x+ with imfile module and gtls stream driver
#     (package: rsyslog-gnutls on Debian/Ubuntu, rsyslog-gnutls on RHEL)
#   - CA certificate installed at /etc/rsyslog.d/ca.pem
#   - Replace siem.example.com / 6514 with your SIEM receiver

module(load="imfile")

# TLS global settings — must appear before any action that uses gtls
global(
    DefaultNetstreamDriver="gtls"
    DefaultNetstreamDriverCAFile="/etc/rsyslog.d/ca.pem"
)

input(type="imfile"
      File="/opt/illumio-ops/logs/illumio_ops.json.log"
      Tag="illumio-ops"
      Severity="info"
      Facility="local7"
      PersistStateInterval="200")

# Forward to remote SIEM over TLS (replace with real host/port)
if $programname == 'illumio-ops' then {
    action(type="omfwd"
           Target="siem.example.com"
           Port="6514"
           Protocol="tcp"
           StreamDriver="gtls"
           StreamDriverMode="1"
           StreamDriverAuthMode="x509/name"
           StreamDriverPermittedPeers="siem.example.com"
           Template="RSYSLOG_SyslogProtocol23Format"
           queue.type="linkedList"
           queue.size="10000"
           action.resumeRetryCount="-1")
    stop
}
