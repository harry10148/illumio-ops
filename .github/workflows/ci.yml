name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Doc link check
        run: python scripts/check_doc_links.py

      - name: i18n audit
        # Hard gate — promoted 2026-05-10 after the 3.26.0-i18n-architecture
        # refactor cleared all residue (audit reports 0 findings).
        run: python scripts/audit_i18n_usage.py

      - name: Type check (strict subset)
        # Hard gate — checks ONLY the 3 entry files Batch 5 M11 typed.
        # --follow-imports=silent uses imported modules for type inference
        # but suppresses their (still ~118) errors; promoting the rest to
        # hard would require typing the transitive surface (gui/_helpers,
        # html_exporter, cli/_render, …), tracked separately.
        run: mypy --follow-imports=silent src/api_client.py src/analyzer.py src/reporter.py

      - name: Lint (ruff)
        # Soft gate — kept non-blocking until the codebase converges on a ruff config.
        # Promote to hard gate once `ruff check src tests` passes cleanly.
        continue-on-error: true
        run: ruff check src tests scripts

      - name: Run tests
        run: pytest --tb=short
