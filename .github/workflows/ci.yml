name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Doc link check
        run: python scripts/check_doc_links.py

      - name: i18n audit
        # Soft gate — surfaces 4 pre-existing findings (zh_TW placeholder leaks).
        # Promote to hard gate after Batch 5 (M11) clears the residue.
        continue-on-error: true
        run: python scripts/audit_i18n_usage.py

      - name: Type check (strict subset)
        # Soft gate — currently surfaces ~116 errors transitively in src/gui, src/cli, etc.
        # Promote to hard gate after Batch 5 Task 5.3 lands type hints on Analyzer / ApiClient / Reporter.
        continue-on-error: true
        run: mypy src/api_client.py src/analyzer.py src/reporter.py

      - name: Lint (ruff)
        # Soft gate — kept non-blocking until the codebase converges on a ruff config.
        # Promote to hard gate once `ruff check src tests` passes cleanly.
        continue-on-error: true
        run: ruff check src tests scripts

      - name: Run tests
        run: pytest --tb=short
