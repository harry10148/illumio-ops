[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short
markers =
    slow: tests slower than ~1s; useful with -m "not slow" for fast iteration
    integration: spans more than one subsystem (cache + ingest + dispatch, etc.)
    requires_pce: requires live PCE access; skipped in CI by default
